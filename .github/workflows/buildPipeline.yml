name: CI Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Build and run Unit and Architecture Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      
      # Generate architecture tests from ADR rules
      - name: Generate ADE Architecture Tests
        run: |
          echo "Setting up ADE tool and plugins..."
          
          # Make binaries executable
          chmod +x bin/linux/ade
          chmod +x bin/linux/plugins/*
          
          # Install plugins to expected location
          mkdir -p ~/.ad-enforcement/plugins
          cp bin/linux/plugins/csharp ~/.ad-enforcement/plugins/
          cp bin/linux/plugins/arch-go ~/.ad-enforcement/plugins/
          
          echo "Generating architecture tests from ADR rules..."
          
          # Generate tests for all rule files
          for rule in ./docs/architecture-decision-log/*.rule; do
            if [ -f "$rule" ]; then
              echo "  Processing: $rule"
              ./bin/linux/ade compile -i "$rule" -o ./rules -p csharp
            fi
          done
          
          # Copy generated tests to ArchTests project
          mkdir -p ./src/Tests/ArchTests/Generated
          cp ./rules/*.g.cs ./src/Tests/ArchTests/Generated/ 2>/dev/null || true
          
          echo "[OK] Generated $(ls -1 ./src/Tests/ArchTests/Generated/*.g.cs 2>/dev/null | wc -l) test files"
      
      - name: Run build
        run: ./build.sh BuildAndUnitTests --configuration Release

  integration:
    name: Build and run Integration Tests
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Run build
        run: ./build.sh RunAllIntegrationTests
