name: CI Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Build and run Unit and Architecture Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install ade
        run: go install github.com/phi42/ad-enforcement-tool/ade@v0.1.1-dev

      - name: Install netarch plugin
        run: ade plugin install netarch --repo github.com/phi42/ad-plugin-netarchtest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate architecture tests from ADR rules
        run: ade compile -i docs/architecture-decision-log/ -p netarch -o src/Tests/ArchTests/Generated/

      - name: Run build
        run: ./build.sh BuildAndUnitTests --configuration Release

  rule-check:
    name: Check Architecture File Rules
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install ade
        run: go install github.com/phi42/ad-enforcement-tool/ade@v0.1.1-dev

      - name: Install fscheck plugin
        run: ade plugin install fscheck --repo github.com/phi42/ad-plugin-fscheck
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check architecture file rules
        run: ade verify -i docs/architecture-decision-log/ -p fscheck -r src

